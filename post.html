<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>New note — pris.la</title>
  <meta name="description" content="Voice-to-text quick publish for the pris.la blog." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#262a4f" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #262a4f;
      --panel: #2f3459;
      --text: #D6D3E4;
      --muted: #8f8cb5;
      --line: rgba(255,255,255,0.12);
      --pink: #F4A7C1;
      --pink-ink: #262a4f;
    }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    }
    .brand b { color: var(--pink); font-weight: 500; }
    .gear {
      background: none; border: 1px solid var(--line); color: var(--muted);
      width: 34px; height: 34px; border-radius: 9px; font-size: 15px; cursor: pointer;
    }
    h1 { font-size: 24px; font-weight: 700; margin: 4px 0 2px; letter-spacing: -0.01em; }
    .sub { color: var(--muted); font-size: 14.5px; margin: 0 0 18px; }

    textarea {
      width: 100%; flex: 1 1 auto; min-height: 34vh; resize: vertical;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--line); border-radius: 14px;
      padding: 16px; font: inherit; line-height: 1.65;
    }
    textarea:focus { outline: none; border-color: var(--pink); }
    textarea::placeholder { color: var(--muted); }

    .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
    select, .toggle {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font: inherit; font-size: 14px;
    }
    .toggle { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .toggle input { accent-color: var(--pink); width: 16px; height: 16px; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    button.big {
      border: none; border-radius: 13px; padding: 16px; font: inherit; font-weight: 600; font-size: 16px; cursor: pointer;
    }
    #mic { background: var(--panel); color: var(--text); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; gap: 9px; }
    #mic.live { background: var(--pink); color: var(--pink-ink); border-color: var(--pink); }
    #mic .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    #mic.live .dot { background: var(--pink-ink); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
    #publish { background: var(--pink); color: var(--pink-ink); }
    #publish:disabled { opacity: 0.5; cursor: default; }

    .status { margin-top: 16px; font-size: 14.5px; min-height: 22px; }
    .status a { color: var(--pink); }
    .status.err { color: #ff9db3; }
    .status.ok { color: #9be7c0; }

    dialog {
      background: var(--panel); color: var(--text); border: 1px solid var(--line);
      border-radius: 16px; padding: 22px; max-width: 380px; width: calc(100% - 32px);
    }
    dialog::backdrop { background: rgba(10,12,28,0.6); }
    dialog h2 { margin: 0 0 4px; font-size: 18px; }
    dialog p { color: var(--muted); font-size: 14px; margin: 0 0 14px; }
    dialog input {
      width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px; font: inherit; margin-bottom: 14px;
    }
    dialog .drow { display: flex; gap: 10px; justify-content: flex-end; }
    dialog button { border: none; border-radius: 10px; padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer; }
    dialog .cancel { background: transparent; color: var(--muted); border: 1px solid var(--line); }
    dialog .save { background: var(--pink); color: var(--pink-ink); }
    .hint { color: var(--muted); font-size: 13px; margin-top: 10px; }
    .keycheck { font-size: 13px; margin: -6px 0 12px; min-height: 18px; }
    .keycheck.ok { color: #9be7c0; }
    .keycheck.err { color: #ff9db3; }

    /* Media picker */
    .addmedia {
      margin-top: 12px; display: inline-flex; align-items: center; gap: 8px;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px;
      font: inherit; font-size: 14px; cursor: pointer;
    }
    .addmedia:active { border-color: var(--pink); }
    .media-strip { margin-top: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; }
    .media-strip:empty { display: none; }
    .thumb {
      position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden;
      background: var(--bg); border: 1px solid var(--line);
    }
    .thumb img, .thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb .badge {
      position: absolute; left: 5px; bottom: 5px; font-size: 10px; font-weight: 600;
      background: rgba(0,0,0,0.6); color: #fff; padding: 2px 6px; border-radius: 6px; letter-spacing: 0.04em;
    }
    .thumb .rm {
      position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border: none;
      border-radius: 50%; background: rgba(0,0,0,0.62); color: #fff; font-size: 14px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .thumb.uploading { display: flex; align-items: center; justify-content: center; }
    .thumb.uploading .spin { font-size: 11px; color: var(--muted); text-align: center; padding: 4px; }
    .thumb.failed { border-color: #ff9db3; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="brand"><b>pris.la</b> / blog / new</span>
      <button class="gear" id="gear" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <h1>New note</h1>
    <p class="sub">Record and talk, type, and add photos or videos. Then publish — it goes straight to the blog.</p>

    <textarea id="text" placeholder="Speak or type your note…"></textarea>

    <div class="row">
      <select id="tag" aria-label="Tag">
        <option value="">Tag: auto</option>
        <option>AI</option><option>Design</option><option>Product</option><option>Data</option><option>Tools</option>
      </select>
      <select id="edit" aria-label="Editing level">
        <option value="off">Edit: off (raw)</option>
        <option value="format">Format only</option>
        <option value="correct" selected>Fix grammar &amp; typos</option>
        <option value="polish">Polish to better English</option>
      </select>
    </div>

    <button type="button" class="addmedia" id="addMedia">📷 Add photo / video</button>
    <input type="file" id="fileInput" accept="image/*,video/*" multiple hidden />
    <div class="media-strip" id="mediaStrip"></div>

    <div class="actions">
      <button class="big" id="mic"><span class="dot"></span><span id="micLabel">Record</span></button>
      <button class="big" id="publish">Publish</button>
    </div>

    <div class="status" id="status"></div>
    <p class="hint" id="micHint"></p>
  </div>

  <dialog id="settings">
    <h2>Publish key</h2>
    <p>Paste the secret you set in Vercel (<code>BLOG_POST_SECRET</code>). Stored only on this device.</p>
    <!-- text (not password) + new-password autocomplete: stops mobile password
         managers autofilling a saved site password over the key. -->
    <input type="text" id="secretInput" placeholder="Secret key" autocomplete="new-password"
           name="blog-publish-key" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <p class="keycheck" id="keyCheck"></p>
    <div class="drow">
      <button class="cancel" id="cancelSettings">Cancel</button>
      <button class="cancel" id="checkSettings">Check</button>
      <button class="save" id="saveSettings">Save</button>
    </div>
  </dialog>

  <script>
    const $ = (id) => document.getElementById(id);
    const ta = $("text"), statusEl = $("status");
    const KEY = "blogPostSecret";

    // ── Settings / secret ──
    const dlg = $("settings");
    function setKeyCheck(msg, kind) {
      const el = $("keyCheck");
      el.className = "keycheck " + (kind || "");
      el.textContent = msg || "";
    }
    $("gear").onclick = () => {
      $("secretInput").value = localStorage.getItem(KEY) || "";
      setKeyCheck("");
      dlg.showModal();
    };
    $("cancelSettings").onclick = () => dlg.close();
    $("saveSettings").onclick = () => {
      const v = $("secretInput").value.trim();
      if (v) localStorage.setItem(KEY, v); else localStorage.removeItem(KEY);
      dlg.close();
      setStatus(v ? "Key saved on this device." : "Key cleared.", "");
    };

    // Verify a key against the server without publishing anything: an empty
    // body passes auth then fails validation, so 400 = good key, 401 = bad key.
    $("checkSettings").onclick = async () => {
      const v = $("secretInput").value.trim();
      if (!v) { setKeyCheck("Enter a key first.", "err"); return; }
      setKeyCheck("Checking…", "");
      try {
        const res = await fetch("/api/post", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-blog-secret": v },
          body: JSON.stringify({}),
        });
        if (res.status === 401) setKeyCheck("✕ Wrong key — the server rejected it.", "err");
        else if (res.status === 400) setKeyCheck("✓ Key works. Tap Save.", "ok");
        else setKeyCheck("Unexpected response (" + res.status + ").", "err");
      } catch (err) {
        setKeyCheck("Couldn't reach the server: " + err.message, "err");
      }
    };

    function getSecret() { return localStorage.getItem(KEY) || ""; }

    // A 401 means the stored key is wrong — send them straight to fixing it.
    function handleUnauthorized(what) {
      setStatus(what + " failed: wrong publish key. Re-enter it below.", "err");
      $("secretInput").value = localStorage.getItem(KEY) || "";
      setKeyCheck("The server rejected this key.", "err");
      dlg.showModal();
    }

    function setStatus(msg, kind) { statusEl.className = "status " + (kind || ""); statusEl.innerHTML = msg; }

    // ── Media: upload photos/videos directly to Vercel Blob ──
    const strip = $("mediaStrip");
    let uploadClient = null;
    let mediaSeq = 0;
    const mediaItems = []; // { id, type, url, status, el }

    // uploadPresigned pairs with handleUploadPresigned on the server — the flow
    // that works with OIDC-based Blob stores (no BLOB_READ_WRITE_TOKEN needed).
    async function getUpload() {
      if (!uploadClient) {
        const mod = await import("https://esm.sh/@vercel/blob@2.6.1/client");
        uploadClient = mod.uploadPresigned;
      }
      return uploadClient;
    }

    $("addMedia").addEventListener("click", () => {
      if (!getSecret()) { setStatus("Set your publish key first (⚙).", "err"); dlg.showModal(); return; }
      $("fileInput").click();
    });

    $("fileInput").addEventListener("change", (e) => {
      for (const file of e.target.files) addFile(file);
      e.target.value = ""; // allow re-picking the same file
    });

    function addFile(file) {
      const id = ++mediaSeq;
      const type = file.type.startsWith("video") ? "video" : "image";
      const item = { id, type, url: null, status: "uploading", el: null };
      mediaItems.push(item);

      const el = document.createElement("div");
      el.className = "thumb uploading";
      el.innerHTML = '<div class="spin">Uploading…</div>';
      const rm = document.createElement("button");
      rm.className = "rm"; rm.textContent = "×"; rm.title = "Remove";
      rm.onclick = () => removeItem(id);
      el.appendChild(rm);
      strip.appendChild(el);
      item.el = el;

      uploadFile(file, item);
    }

    async function uploadFile(file, item) {
      try {
        const upload = await getUpload();
        const safeName = (file.name || "upload").replace(/[/\\]+/g, "-").slice(-80);
        const blob = await upload(`blog/${safeName}`, file, {
          access: "public",
          handleUploadUrl: "/api/blob-upload",
          contentType: file.type,
          clientPayload: JSON.stringify({ secret: getSecret() }),
        });
        item.url = blob.url;
        item.status = "done";
        renderThumb(item, file);
      } catch (err) {
        if (/unauthor/i.test(err.message || "")) handleUnauthorized("Upload");
        item.status = "failed";
        item.el.classList.remove("uploading");
        item.el.classList.add("failed");
        item.el.querySelector(".spin")?.remove();
        const msg = document.createElement("div");
        msg.className = "spin"; msg.textContent = "Failed";
        item.el.appendChild(msg);
        setStatus("Upload failed: " + err.message, "err");
      }
    }

    function renderThumb(item, file) {
      const el = item.el;
      el.classList.remove("uploading");
      el.querySelector(".spin")?.remove();
      const preview = item.type === "video"
        ? document.createElement("video")
        : document.createElement("img");
      preview.src = URL.createObjectURL(file);
      if (item.type === "video") { preview.muted = true; preview.playsInline = true; }
      el.insertBefore(preview, el.firstChild);
      const badge = document.createElement("span");
      badge.className = "badge"; badge.textContent = item.type === "video" ? "VIDEO" : "PHOTO";
      el.appendChild(badge);
    }

    function removeItem(id) {
      const i = mediaItems.findIndex((m) => m.id === id);
      if (i === -1) return;
      mediaItems[i].el?.remove();
      mediaItems.splice(i, 1);
    }

    function mediaState() {
      const uploading = mediaItems.some((m) => m.status === "uploading");
      const ready = mediaItems.filter((m) => m.status === "done").map((m) => ({ url: m.url, type: m.type }));
      return { uploading, ready };
    }

    // ── Voice capture: record audio, transcribe server-side with Whisper ──
    const mic = $("mic"), micLabel = $("micLabel");
    let mediaRecorder = null, chunks = [], stream = null, recording = false;

    const canRecord = !!(navigator.mediaDevices && window.MediaRecorder);
    if (!canRecord) {
      mic.disabled = true;
      $("micHint").textContent = "Recording isn't supported in this browser — tap the mic on your keyboard to dictate instead.";
    }

    function pickMime() {
      const types = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4", "audio/ogg"];
      return types.find((t) => window.MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) || "";
    }

    async function startRecording() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (_) {
        setStatus("Microphone permission denied.", "err");
        return;
      }
      const mimeType = pickMime();
      chunks = [];
      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
      mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      mediaRecorder.onstop = () => transcribe(new Blob(chunks, { type: mediaRecorder.mimeType || "audio/webm" }));
      mediaRecorder.start();
      recording = true;
      mic.classList.add("live");
      micLabel.textContent = "Stop";
      setStatus("Recording… tap Stop when done.", "");
    }

    function stopRecording() {
      recording = false;
      mic.classList.remove("live");
      micLabel.textContent = "Record";
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
      if (stream) stream.getTracks().forEach((t) => t.stop());
    }

    async function transcribe(blob) {
      const secret = getSecret();
      if (!secret) { setStatus("Set your publish key first (⚙).", "err"); dlg.showModal(); return; }
      mic.disabled = true;
      setStatus("Transcribing…", "");
      try {
        const res = await fetch("/api/transcribe", {
          method: "POST",
          headers: { "Content-Type": blob.type || "audio/webm", "x-blog-secret": secret },
          body: blob,
        });
        if (res.status === 401) { handleUnauthorized("Transcription"); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
        const text = (data.text || "").trim();
        if (!text) { setStatus("Didn't catch anything — try again.", "err"); return; }
        ta.value = ta.value.trim() ? ta.value.replace(/\s+$/, "") + "\n\n" + text : text;
        setStatus("Transcribed. Review, then Publish.", "ok");
      } catch (err) {
        setStatus("Transcription failed: " + err.message, "err");
      } finally {
        mic.disabled = false;
      }
    }

    mic.addEventListener("click", () => { recording ? stopRecording() : startRecording(); });
    function stopListening() { if (recording) stopRecording(); } // used by Publish

    // ── Publish ──
    $("publish").addEventListener("click", async () => {
      const text = ta.value.trim();
      const { uploading, ready } = mediaState();
      if (!text && ready.length === 0) { setStatus("Add a note or some media first.", "err"); return; }
      if (uploading) { setStatus("Hang on — media is still uploading.", "err"); return; }
      const secret = getSecret();
      if (!secret) { setStatus("Set your publish key first (⚙).", "err"); dlg.showModal(); return; }

      stopListening();
      const btn = $("publish");
      btn.disabled = true;
      setStatus("Publishing…", "");
      try {
        const res = await fetch("/api/post", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-blog-secret": secret },
          body: JSON.stringify({
            text,
            edit: $("edit").value,
            tag: $("tag").value || undefined,
            media: ready,
          }),
        });
        if (res.status === 401) { handleUnauthorized("Publish"); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
        ta.value = "";
        mediaItems.splice(0).forEach((m) => m.el?.remove());
        const mediaNote = data.media ? ` with ${data.media} media` : "";
        const label = (data.title ? `“${data.title}”` : "Note") + mediaNote;
        const link = data.commit ? ` <a href="${data.commit}" target="_blank" rel="noopener">View commit ↗</a>` : "";
        setStatus(`Published ${label} ✓ — committed. Building now; live on the blog in a few minutes.${link}`, "ok");
      } catch (err) {
        setStatus("Failed: " + err.message, "err");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
